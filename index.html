<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市排序列表</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #007bff;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background-color: #fff;
            margin: 10px;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>城市排序列表</h1>
    <h2>原始城市列表</h2>
    <ul>
        <li>Taipei</li>
        <li>Kaohsiung</li>
        <li>Taichung</li>
        <li>Tainan</li>
        <li>Hsinchu</li>
    </ul>
    <h2>排序後的城市列表 (氣泡排序)</h2>
    <ul>
        <li>Hsinchu</li>
        <li>Kaohsiung</li>
        <li>Taichung</li>
        <li>Tainan</li>
        <li>Taipei</li>
    </ul>
</body>
</html>
